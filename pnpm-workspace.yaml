packages:
  - apps/*
  - packages/*

catalog:
  "@playwright/experimental-ct-vue": 1.60.0
  "@playwright/test": 1.60.0
  "@vue/compiler-core": 3.5.35
  "@vue/compiler-dom": 3.5.35
  "@vue/compiler-sfc": 3.5.35
  "@vue/compiler-ssr": 3.5.35
  "@vue/shared": 3.5.35
  "@types/node": 24.13.1
  chart.js: 4.5.1
  nuxt: 4.4.7
  playwright: 1.60.0
  playwright-core: 1.60.0
  sass-embedded: 1.100.0
  typescript: 5.9.3
  unplugin-dts: 1.0.2
  vite: 8.0.16
  vue: 3.5.35
  vue-component-meta: 3.3.3
  vue-tsc: 3.3.3

# Security settings (See: https://pnpm.io/supply-chain-security)
trustPolicy: "no-downgrade"
trustPolicyExclude:
  - "chokidar@4.0.3" # See https://github.com/paulmillr/chokidar/issues/1440
  - "semver@6.3.1" # See https://github.com/npm/node-semver/issues/838
minimumReleaseAge: 2880 # Wait two days after a new version release - This is in sync with the `dependabot.yml` `cooldown` config
allowBuilds:
  "@parcel/watcher": true # Downloads binary
  "better-sqlite3": true # Downloads binary
  "esbuild": true # Downloads binary
  sharp: true # Downloads binary
  "simple-git-hooks": true # Setup and update git hooks

overrides:
  "@playwright/experimental-ct-vue": "catalog:"
  "@playwright/test": "catalog:"
  "@vue/compiler-core": "catalog:"
  "@vue/compiler-dom": "catalog:"
  "@vue/compiler-sfc": "catalog:"
  "@vue/compiler-ssr": "catalog:"
  "@vue/shared": "catalog:"
  nuxt: "catalog:"
  playwright: "catalog:"
  playwright-core: "catalog:"
  typescript: "catalog:"
  vite: "catalog:"
  vue: "catalog:"
  sass-embedded: "catalog:"
