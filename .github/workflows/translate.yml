name: Automate translation
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: 🛃 Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "🛒 Checkout Repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/templates/node-setup

      - run: node .github/scripts/translate.ts
        name: Translate
        env:
          MY_API_CLIENT_ID: ${{ secrets.MY_API_CLIENT_ID }}
          MY_API_CLIENT_SECRET: ${{ secrets.MY_API_CLIENT_SECRET }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore: update translations"
          title: "chore: update translations"
          body: This is an auto-generated pull request. All missing translations have been updated.
          branch-suffix: short-commit-hash # needed to not override other pull requests created via workflows
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
