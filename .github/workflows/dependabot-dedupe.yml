name: Deduplicate Dependabot PRs

on:
  push:
    branches:
      - "dependabot/npm_and_yarn/*"
    paths:
      - "**/package.json"
      - "pnpm-lock.json"
      - "pnpm-workspace.json"

permissions:
  contents: read

jobs:
  dedupe:
    name: Deduplicate dependencies
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
    steps:
      - name: "🛃 Harden the runner (Audit all outbound calls)"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "🛒 Checkout Repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/templates/node-setup
        with:
          pnpm_install_command: "pnpm install --frozen-lockfile --ignore-scripts"

      - name: Deduplicate dependencies
        run: pnpm dedupe

      - name: Set up Git
        run: |
          git config user.name "Dedupe Bot[bot]"
          git config user.email "bot@example.com"

      - name: Commit and push changes
        run: |
          git add pnpm-lock.yaml
          git commit -m "🧹 Deduplicate dependencies [dependabot skip]" || echo "No changes to commit"
          git push origin ${{ github.ref_name }}
