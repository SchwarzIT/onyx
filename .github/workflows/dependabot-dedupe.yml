name: Deduplicate Dependabot PRs

on:
  push:
    branches:
      - "dependabot/npm_and_yarn/*"
    paths:
      - "**/package.json"
      - "pnpm-lock.json"
      - "pnpm-workspace.json"

permissions:
  contents: read

jobs:
  dedupe:
    name: Deduplicate dependencies
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
    steps:
      - name: "🛃 Harden the runner (Audit all outbound calls)"
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: "🛒 Checkout Repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/templates/node-setup
        with:
          pnpm_install_command: "pnpm install --frozen-lockfile --ignore-scripts"

      - name: Deduplicate dependencies
        run: pnpm dedupe

      - name: Set up Git
        run: |
          git config user.name "Dedupe Bot[bot]"
          git config user.email "bot@example.com"

      - name: Commit and push changes
        run: |
          git add pnpm-lock.yaml
          git commit -m "🧹 Deduplicate dependencies [dependabot skip]" || echo "No changes to commit"
          git push origin ${{ github.ref_name }}
