name: Playwright tests
on:
  workflow_call:
    inputs:
      only-changed:
        type: string
        required: false
        description: If set, only tests for changed files are run (based on the passed git ref)
      update-snapshots:
        type: boolean
        default: false
        description: Whether to update snapshots / screenshots

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.queryPackages.outputs.packages }}
    steps:
      - name: "🛃 Harden the runner (Audit all outbound calls)"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "🛒 Checkout Repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/templates/node-setup

      - id: queryPackages
        name: Query Packages
        run: |
          set -ex

          query="query { ${{ (inputs.only-changed != '' && format('packages: affectedPackages(base: \"{0}\"', inputs.only-changed)) || 'packages(' }} filter: { has: { field: TASK_NAME, value: \"test:playwright\" } }) { items { name } } }"

          # 1. Query all packages that have a "test:playwright" script
          # 2. Extract array with package names
          # 3. Prepare for GITHUB_OUTPUT
          pnpm turbo query "$query" \
          | jq -c ".data.packages.items | map(.name)" \
          | awk '{print "packages="$1}' \
          | tee "$GITHUB_OUTPUT" \
          | cat

  playwright:
    needs: prepare
    if: fromJSON(needs.prepare.outputs.packages)[0] != null
    strategy:
      fail-fast: false
      max-parallel: 15
      matrix:
        package: ${{ fromJSON(needs.prepare.outputs.packages) }}
        shard: [1]
        include:
          - package: "sit-onyx"
            shard: 1
            totalShards: 10
          - package: "sit-onyx"
            shard: 2
            totalShards: 10
          - package: "sit-onyx"
            shard: 3
            totalShards: 10
          - package: "sit-onyx"
            shard: 4
            totalShards: 10
          - package: "sit-onyx"
            shard: 5
            totalShards: 10
          - package: "sit-onyx"
            shard: 6
            totalShards: 10
          - package: "sit-onyx"
            shard: 7
            totalShards: 10
          - package: "sit-onyx"
            shard: 8
            totalShards: 10
          - package: "sit-onyx"
            shard: 9
            totalShards: 10
          - package: "sit-onyx"
            shard: 10
            totalShards: 10
    name: Playwright shard
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_REMOTE_CACHE__TURBO_TOKEN }}
    steps:
      - name: "🛃 Harden the runner (Audit all outbound calls)"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "🛒 Checkout Repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # We need the git history for playwright to be able determine the changed files

      - uses: ./.github/templates/node-setup

      # install system dependencies for Playwright
      # https://github.com/actions/runner-images/issues/7048
      - name: 📦 Install Playwright system dependencies
        id: first-playwright-install
        run: |
          set -ex
          pnpm exec playwright install --only-shell --with-deps firefox webkit chromium-headless-shell
        timeout-minutes: 3
        continue-on-error: true

      - name: 📦 Install Playwright system dependencies using fallback mirror
        if: ${{ steps.first-playwright-install.outcome == 'failure' }}
        run: |
          set -ex

          # Clean-up in progress installation: https://wiki.debian.org/Teams/Dpkg/FAQ#db-lock
          sudo killall -q apt apt-get || true
          sudo fuser -vk -KILL /var/lib/dpkg/lock /var/lib/dpkg/lock-frontend || true
          sudo dpkg --configure -a

          # Use different mirror
          sudo sed -i 's/azure.archive.ubuntu.com/mirror.enzu.com/g' /etc/apt/apt-mirrors.txt
          sudo cat /etc/apt/apt-mirrors.txt

          pnpm exec playwright install --only-shell --with-deps firefox webkit chromium-headless-shell
        timeout-minutes: 10

      - name: 🔎 Run Playwright tests
        run: pnpm run test:playwright:all --filter="${{ matrix.package }}" --concurrency 1 ${{ ((inputs.only-changed != '' && matrix.package == 'sit-onyx') && format('-- --only-changed {0}', inputs.only-changed)) || '' }}
        env:
          PW_UPDATE_SNAPSHOTS: "${{ inputs.update-snapshots }}"
          PW_SHARD: "${{ matrix.shard }}"
          PW_TOTAL_SHARDS: "${{ matrix.totalShards }}"
          TURBO_SCM_BASE: "${{ inputs.only-changed }}"

      - name: Escape name
        id: escapedName
        if: ${{ !cancelled() }}
        run: |
          escaped=$(echo -n "${{ matrix.package }}" | tr -C "[:alnum:]" "_")
          echo "ESCAPED_PACKAGE_NAME=$escaped" >> "$GITHUB_OUTPUT"

      # we only want to include actual changed screenshots in the artifact to prevent that old/unchanged screenshots
      # override changed screenshots from other shards when creating the pull request
      - name: Copy changed files
        if: ${{ inputs.update-snapshots == true }}
        run: |
          mkdir ./changed-screenshots
          rsync -R $(git ls-files --others --modified --exclude-standard) ./changed-screenshots/ || echo "no changed files found"

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ inputs.update-snapshots == true }}
        env:
          ESCAPED_PACKAGE_NAME: ${{ steps.escapedName.outputs.ESCAPED_PACKAGE_NAME }}
        with:
          name: screenshots-${{ env.ESCAPED_PACKAGE_NAME }}-${{ matrix.shard }}
          path: changed-screenshots
          # prevent warnings if shard does not update any screenshots
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload Reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        env:
          ESCAPED_PACKAGE_NAME: ${{ steps.escapedName.outputs.ESCAPED_PACKAGE_NAME }}
        with:
          name: blob-report-${{ env.ESCAPED_PACKAGE_NAME }}-${{ matrix.shard }}
          path: |
            ./packages/**/blob-report
            ./apps/**/blob-report
            !**/node_modules/**
          retention-days: 1

  # this final step is needed to we can set make the Playwright tests a required check in pull requests
  # because we don't want to add each parallel matrix job individually
  # see: https://github.com/orgs/community/discussions/26822#discussioncomment-3305794
  playwright-result:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Collect Playwright result
    needs: playwright
    steps:
      - name: "🛃 Harden the runner (Audit all outbound calls)"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "🛒 Checkout Repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Merge Screenshots
        uses: actions/upload-artifact/merge@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          name: screenshots
          pattern: screenshots-*
          retention-days: 14

      - name: Download reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ !cancelled() }}
        with:
          pattern: blob-report-*
          merge-multiple: true

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install

      # For every blob-report merge its playwright results as html report and move it into its original package
      - name: Merge into HTML Report
        run: find . -type d -name blob-report | xargs -n1 -I {} sh -c 'npx playwright merge-reports --reporter html {} && mv playwright-report {}/../playwright-report'

      # The html report can be manually downloaded and after extraction a static file server can be used to show the results.
      # A file server is necessary, otherwise not all features are supported.
      # E.g. use `python3 -m http.server` or `npx serve` to quick and easily start one.
      - name: Upload HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: |
            ./packages/*/playwright-report
            ./apps/*/playwright-report
          retention-days: 14

      - run: |
          result="${{ needs.playwright.result }}"
          if [[ $result == "success" || $result == "skipped" ]]; then
            exit 0
          else
            exit 1
          fi
